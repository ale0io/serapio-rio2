  background-position: center 20%;
  background-repeat: no-repeat;

  mix-blend-mode: screen;
  filter: saturate(1.6) hue-rotate(-10deg) brightness(1.1);
}

canvas#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  border: 1px solid #cc2200;
  transform: rotate(45deg) translate(-50%,-50%);
  pointer-events: none;
  z-index: 999;
  transition: transform 0.1s, width 0.2s, height 0.2s;
  mix-blend-mode: difference;
}

#cursor.big {
  width: 28px;
  height: 28px;
}

main {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.center-glyph {
  position: relative;
  width: 180px;
  height: 180px;
  cursor: pointer;
}

.center-glyph svg {
  width: 100%;
  height: 100%;
  animation: rotateSlow 40s linear infinite;
}

.center-glyph .inner-eye {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.center-glyph .inner-eye svg {
  animation: rotateReverse 20s linear infinite;
  width: 80px;
  height: 80px;
}

@keyframes rotateSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes rotateReverse {
  from { transform: rotate(0deg); }
  to { transform: rotate(-360deg); }
}

.title-float {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.1rem, 3vw, 1.6rem);
  letter-spacing: 0.3em;
  color: #cc2200;
  opacity: 0.12;
  margin-top: 28px;
  text-align: center;
  animation: flicker 8s ease-in-out infinite;
  transition: opacity 0.5s;
}

.title-float:hover { opacity: 0.6; }

@keyframes flicker {
  0%,100%{opacity:0.12}
  45%{opacity:0.12}
  47%{opacity:0.3}
  49%{opacity:0.12}
  60%{opacity:0.18}
  62%{opacity:0.08}
  64%{opacity:0.18}
}

.glitch-text {
  font-family: 'VT323', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: #8b1a00;
  opacity: 0.25;
  position: fixed;
  animation: drift linear infinite;
  pointer-events: none;
  z-index: 1;
}

@keyframes drift {
  from { transform: translateY(0); opacity: 0.25; }
  to { transform: translateY(-40px); opacity: 0; }
}

.portal {
  position: fixed;
  text-decoration: none;
  color: #cc2200;
  font-family: 'Uncial Antiqua', serif;
  font-style: italic;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  opacity: 0.04;
  transition: opacity 0.6s, color 0.3s;
  cursor: pointer;
  white-space: nowrap;
  z-index: 10;
}

.portal::after {
  content: attr(data-glyph);
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'VT323', monospace;
  font-size: 0.6rem;
  color: #6a1010;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.portal:hover {
  opacity: 1 !important;
  color: #ff4400;
}

.portal:hover::after { opacity: 1; }

#scanline {
  position: fixed;
  left: 0; right: 0;
  height: 2px;
  background: rgba(220,60,0,0.04);
  pointer-events: none;
  z-index: 5;
  animation: scan 6s linear infinite;
}

@keyframes scan {

}

#hint {

@keyframes hintFade {

}

}

<div id="hint">· mover el cursor para encontrar ·</div>
<div id="start-hint" style="position:fixed;bottom:48px;left:50%;transform:translateX(-50%);font-family:'VT323',monospace;font-size:0.65rem;letter-spacing:0.3em;color:#cc2200;opacity:0;transition:opacity 1s;pointer-events:none;white-space:nowrap;z-index:10;">· click para despertar el sonido ·</div>

<script>
const cursor  = document.getElementById('cursor');
const tooltip = document.getElementById('tooltip');
let mx = window.innerWidth/2, my = window.innerHeight/2;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  tooltip.style.left = (mx + 18) + 'px';
  tooltip.style.top  = (my - 10) + 'px';
  checkProximity(mx, my);
});

// Canvas — campo de partículas conectadas
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const pts = Array.from({length: 60}, () => ({
  x:  Math.random() * window.innerWidth,
  y:  Math.random() * window.innerHeight,
  vx: (Math.random() - 0.5) * 0.18,
  vy: (Math.random() - 0.5) * 0.18,
  r:  Math.random() * 1.2 + 0.3,
  opacity: Math.random() * 0.3 + 0.05
}));

function drawCanvas() {
  ctx.clearRect(0, 0, W, H);
  for (let i = 0; i < pts.length; i++) {
    for (let j = i+1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x;
      const dy = pts[i].y - pts[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 130) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(220,60,0,${0.05*(1-d/130)})`;
        ctx.lineWidth = 0.4;
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.stroke();
      }
    }
  }
  for (const p of pts) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.fillStyle = `rgba(220,60,0,${p.opacity})`;
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }
  requestAnimationFrame(drawCanvas);
}
drawCanvas();

// Posiciones de los portales (% del viewport)
const portals = [
  { id:'p-bandcamp', pct:[0.12, 0.22] },
  { id:'p-substack', pct:[0.78, 0.18] },
  { id:'p-youtube',  pct:[0.08, 0.72] },
  { id:'p-ig',       pct:[0.82, 0.74] },
  { id:'p-tiktok',   pct:[0.50, 0.88] },
];

portals.forEach(({id, pct}) => {
  const el = document.getElementById(id);
  el.style.left = (pct[0] * 100) + 'vw';
  el.style.top  = (pct[1] * 100) + 'vh';
  el.textContent = el.dataset.name;
});

// Proximidad — revela el portal al acercar el cursor
function checkProximity(x, y) {
  let anyClose = false;
  portals.forEach(({id, pct}) => {
    const el = document.getElementById(id);
    const px = pct[0] * window.innerWidth;
    const py = pct[1] * window.innerHeight;
    const d  = Math.sqrt((x-px)**2 + (y-py)**2);
    const threshold = 90;
    if (d < threshold) {
      const t = 1 - (d / threshold);
      el.style.opacity = (0.08 + t * 0.92).toFixed(2);
      cursor.classList.add('big');
      tooltip.style.opacity = '1';
      tooltip.textContent   = '· ' + el.dataset.glyph + ' ·';
      anyClose = true;
    } else {
      el.style.opacity = '0.04';
    }
  });
  if (!anyClose) {
    cursor.classList.remove('big');
    tooltip.style.opacity = '0';
  }
}

// Click en el glifo central — flashea todos los portales
document.getElementById('mainGlyph').addEventListener('click', () => {
  portals.forEach(({id}) => {
    const el = document.getElementById(id);
    el.style.transition = 'opacity 0.1s';
    el.style.opacity = '0.7';
    setTimeout(() => {
      el.style.transition = 'opacity 1.5s';
      el.style.opacity = '0.04';
    }, 700);
  });
});

// Palabras flotantes
const glitchWords = ['काली','∞','शक्ति','◈','kālī','⌬','शिव','▽','río','✦','māyā','⊕','ॐ','◯','tantra','△','चण्डी'];
setInterval(() => {
  const el = document.createElement('div');
  el.className = 'glitch-text';
  el.textContent = glitchWords[Math.floor(Math.random() * glitchWords.length)];
  el.style.left     = (10 + Math.random() * 80) + 'vw';
  el.style.top      = (20 + Math.random() * 60) + 'vh';
  el.style.animationDuration = (4 + Math.random() * 6) + 's';
  el.style.animationDelay   = '0s';
  el.style.fontSize = (0.5 + Math.random() * 0.6) + 'rem';
  el.style.opacity  = (0.08 + Math.random() * 0.18) + '';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 10000);
}, 1400);

const audio = document.getElementById('ambientAudio');
audio.volume = 0;

let audioStarted = false;
function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  const p = audio.play();
  if (p !== undefined) {
    p.then(() => {
      let vol = 0;
      const fade = setInterval(() => {
        vol = Math.min(vol + 0.012, 0.45);
        audio.volume = vol;
        if (vol >= 0.45) clearInterval(fade);
      }, 80);
      const hint = document.getElementById('start-hint');
      if (hint) { hint.style.opacity = '0'; setTimeout(() => hint.remove(), 800); }
    }).catch(() => {});
  }
}

document.addEventListener('click', startAudio, { once: true });
document.addEventListener('touchstart', startAudio, { once: true });

setTimeout(() => {
  if (!audioStarted) {
    const hint = document.getElementById('start-hint');
    if (hint) hint.style.opacity = '0.5';
  }
}, 1800);
</script>
